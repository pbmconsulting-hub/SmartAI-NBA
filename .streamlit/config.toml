# ============================================================
# Streamlit Configuration — SmartBetPro NBA
# Forces seamless dark mode, eliminates white flash on load,
# and sets the "Institutional Luxury" colour palette.
# ============================================================

[theme]
primaryColor = "#00f0ff"
backgroundColor = "#070A13"
secondaryBackgroundColor = "#0d1220"
